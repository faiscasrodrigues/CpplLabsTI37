<!DOCTYPE html>
<html>
<head>
<style>

table, th, td {
  border: 1px solid green;
}

table.redTable {
  border: 2px solid #A40808;
  background-color: #EEE7DB;
  width: 50%;
  text-align: center;
  border-collapse: collapse;
}
table.redTable td, table.redTable th {
  border: 1px solid #AAAAAA;
  padding: 3px 2px;
}
table.redTable tbody td {
  font-size: 13px;
}
table.redTable tr:nth-child(even) {
  background: #F5C8BF;
}
table.redTable thead {
  background: #A40808;
}
table.redTable thead th {
  font-size: 19px;
  font-weight: bold;
  color: #FFFFFF;
  text-align: center;
  border-left: 2px solid #A40808;
}
table.redTable thead th:first-child {
  border-left: none;
}

table.redTable tfoot {
  font-size: 13px;
  font-weight: bold;
  color: #FFFFFF;
  background: #A40808;
}
table.redTable tfoot td {
  font-size: 13px;
}
table.redTable tfoot .links {
  text-align: right;
}
table.redTable tfoot .links a{
  display: inline-block;
  background: #FFFFFF;
  color: #A40808;
  padding: 2px 8px;
  border-radius: 5px;
}

</style>
</head>
<body>

<h2>tabela simples:</h2>

<table>
  <tr>
    <th>Nome</th>
    <th>N.Familia</th>
  </tr>
  <tr>
    <td>Nuno</td>
    <td>Rodrigues</td>
  </tr>
  <tr>
    <td>Jorge</td>
    <td>Prestelo</td>
  </tr>
</table>

<br>

<h2>
  tabela de cores
</h2>

<table>

  <table class="redTable">
  <thead>
    <tr>
      <th>head1</th>
      <th>head2</th>
      <th>head3</th>
    </tr>
  </thead>
  <tbody>
    <tr>
      <td>cell1_1</td>
      <td>cell2_1</td>
      <td>cell3_1</td>
    </tr>
    <tr>
      <td>cell1_2</td>
      <td>cell2_2</td>
      <td>cell3_2</td>
    </tr>
    <tr>
      <td>cell1_3</td>
      <td>cell2_3</td>
      <td>cell3_3</td>
    </tr>
    <tr>
      <td>cell1_4</td>
      <td>cell2_4</td>
      <td>cell3_4</td>
    </tr>
    <tr>
      <td>cell1_5</td>
      <td>cell2_5</td>
      <td>cell3_5</td>
    </tr>
  </tbody>
  <tfoot>
    <tr>
      <td colspan="3">
        <div class="links"><a href="#">&laquo;</a> <a class="active" href="#">1</a> <a href="#">2</a> <a href="#">3</a> <a href="#">4</a> <a href="#">&raquo;</a></div>
      </td>
    </tr>
  </tfoot>
</table>
</table>

</body>
</html>
